    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        :root {
            --bg-primary: #0a0a0a; --bg-secondary: #111111; --bg-card: #1a1a1a;
            --accent-cyan: #00f0ff; --accent-cyan-glow: rgba(0, 240, 255, 0.3);
            --accent-cyan-dim: rgba(0, 240, 255, 0.1); --accent-green: #4ade80;
            --accent-yellow: #facc15; --error-red: #f87171; --error-red-glow: rgba(255, 68, 68, 0.3);
            --text-primary: #ffffff; --text-secondary: #9ca3af; --text-muted: #6b7280;
            --border-color: #333333;
            --base-font-size-search: 1.3rem; --base-font-size-title: 16px;
            --base-font-size-detail: 13px; --base-font-size-context: 0.85rem;
        }
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); overflow-x: hidden; -webkit-overflow-scrolling: touch; }
        .screen { display: none; min-height: 100vh; width: 100%; }
        .screen.active { display: flex; flex-direction: column; }
        #loading-screen { justify-content: center; align-items: center; background: var(--bg-primary); padding: 20px; }
        .loading-card { background: var(--bg-card); border-radius: 20px; padding: 50px 30px; width: 100%; max-width: 340px; text-align: center; box-shadow: 0 0 40px rgba(0, 240, 255, 0.15); border: 1px solid var(--border-color); }
        .app-title { font-size: 32px; font-weight: 700; color: var(--accent-cyan); text-shadow: 0 0 20px var(--accent-cyan-glow); animation: pulse-title 2s ease-in-out infinite; }
        @keyframes pulse-title { 0%,100%{opacity:1;text-shadow:0 0 20px var(--accent-cyan-glow);} 50%{opacity:0.85;text-shadow:0 0 30px var(--accent-cyan-glow),0 0 60px var(--accent-cyan);} }
        .spinner { width: 60px; height: 60px; margin: 0 auto; position: relative; }
        .spinner-progress { position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--accent-cyan); border-right-color: var(--accent-cyan); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--text-secondary); font-size: 15px; margin-top: 25px; }

        #login-screen { justify-content: center; align-items: center; background: var(--bg-primary); padding: 20px; }
        .login-card { background: transparent; padding: 40px 28px; width: 100%; max-width: 380px; display: flex; flex-direction: column; align-items: center; }
        .login-title { font-size: 28px; font-weight: 700; color: var(--accent-cyan); text-shadow: 0 0 20px var(--accent-cyan-glow); text-align: center; margin-bottom: 10px; }
        .login-subtitle { color: var(--text-secondary); font-size: 15px; margin-bottom: 30px; text-align: center; }
        .pin-dots-container { display: flex; justify-content: center; gap: 16px; margin-bottom: 40px; }
        .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border-color); background: transparent; transition: all 0.2s; }
        .pin-dot.filled { background: var(--accent-cyan); border-color: var(--accent-cyan); box-shadow: 0 0 12px var(--accent-cyan-glow); }
        .pin-dot.error { background: var(--error-red); border-color: var(--error-red); box-shadow: 0 0 12px var(--error-red-glow); animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px);} 40%{transform:translateX(8px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(4px);} }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; width: 100%; max-width: 300px; margin-bottom: 30px; }
        .pin-btn { aspect-ratio: 1; border-radius: 50%; border: 1.5px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary); font-size: 28px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
        .pin-btn:active { transform: scale(0.92); border-color: var(--accent-cyan); box-shadow: 0 0 20px var(--accent-cyan-glow); }
        .pin-btn.empty { visibility: hidden; pointer-events: none; }
        .pin-btn.backspace { font-size: 22px; color: var(--text-secondary); }
        .pin-hidden-input { position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px; }
        .forgot-pin { color: var(--text-secondary); font-size: 15px; text-decoration: underline; cursor: pointer; background: none; border: none; }

        #main-screen { background: var(--bg-primary); padding: 20px 16px; min-height: 100vh; position: relative; }
        .main-container { max-width: 480px; margin: 0 auto; position: relative; z-index: 1; }
        .header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        .greeting { font-size: 20px; }
        h2.greeting { font-size: 22px; color: var(--accent-cyan); text-shadow: 0 0 15px var(--accent-cyan-glow); }
        h3.greeting { font-size: 14px; color: var(--text-secondary); }
        .menu-btn { background: rgba(220,20,20,0.15); border: 1px solid rgba(220,20,20,0.4); border-radius: 25px; padding: 8px 20px; color: #dc1414; font-size: 13px; font-weight: 700; cursor: pointer; }
        .zoom-panel { display: flex; justify-content: center; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); gap: 12px; }
        .zoom-btn { background: transparent; border: 1px solid var(--border-color); border-radius: 20px; padding: 6px 16px; color: var(--text-secondary); cursor: pointer; }
        .zoom-indicator { color: var(--accent-green); font-size: 14px; font-weight: 600; padding: 4px 14px; background: rgba(74,222,128,0.1); border-radius: 20px; min-width: 85px; text-align: center; }
        .search-input { width: 100%; background: var(--bg-secondary); border: 2px solid var(--accent-cyan); border-radius: 14px; padding: 16px 18px; color: var(--text-primary); font-size: var(--base-font-size-search); outline: none; box-shadow: 0 0 20px var(--accent-cyan-glow); }
        .results-container { margin-bottom: 20px; display: flex; flex-direction: column; gap: 12px; }
        .result-card { background: var(--bg-card); border-radius: 16px; padding: 16px; display: flex; gap: 14px; border: 1px solid var(--border-color); cursor: pointer; transition: all 0.2s; }
        .result-card:hover { border-color: var(--accent-cyan); transform: translateX(4px); box-shadow: 0 0 20px var(--accent-cyan-glow); }
        .result-icon { font-size: 28px; flex-shrink: 0; }
        .result-content { flex: 1; }
        .result-title { font-size: var(--base-font-size-title); font-weight: 600; margin-bottom: 8px; border-bottom: 1px solid var(--border-color); padding-bottom: 6px; }
        .result-detail { font-size: var(--base-font-size-detail); margin-bottom: 6px; line-height: 1.5; }
        .no-results { text-align: center; color: var(--text-muted); padding: 40px 20px; background: var(--bg-card); border-radius: 16px; }
        .notification { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--bg-card); padding: 14px 24px; border-radius: 12px; z-index: 2000; border: 1px solid var(--border-color); opacity: 0; transition: all 0.3s; }
        .notification.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .hidden { display: none !important; }
        
        /* Drawer styles */
        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; visibility: hidden; opacity: 0; transition: all 0.3s; }
        .drawer-overlay.active { visibility: visible; opacity: 1; }
        .drawer { position: fixed; top: 0; right: -50%; width: 50%; height: 100%; background: var(--bg-card); border-left: 1px solid var(--border-color); z-index: 1001; transition: right 0.35s; display: flex; flex-direction: column; overflow-y: auto; }
        .drawer.active { right: 0; }
        .drawer-header { padding: 24px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .drawer-header h3 { color: var(--accent-cyan); font-size: 18px; }
        .drawer-close { background: transparent; border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer; }
        .drawer-menu { flex: 1; padding: 16px 0; display: flex; flex-direction: column; gap: 8px; }
        .drawer-item { background: transparent; border: none; padding: 14px 20px; text-align: left; color: var(--text-primary); font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border-color); width: 100%; }
        .drawer-item:hover { background: rgba(0,240,255,0.1); color: var(--accent-cyan); }
        .drawer-item .item-icon { font-size: 18px; min-width: 28px; }
        .drawer-submenu { display: none; flex-direction: column; background: var(--bg-secondary); }
        .drawer-submenu.active { display: flex; }
        .drawer-submenu .drawer-item { padding-left: 48px; }
        .drawer-back { border-top: 1px solid var(--border-color); margin-top: 8px; color: var(--text-secondary); }
        
        /* Version badge */
        .version-badge {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: var(--text-muted);
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 8px;
            z-index: 999;
            font-family: monospace;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        
        .update-banner {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            background: rgba(26,26,26,0.95);
            border-left: 4px solid #00f0ff;
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10000;
            transform: translateY(120px);
            transition: transform 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .update-banner.show { transform: translateY(0); }
        .update-banner-btn { background: #00f0ff; border: none; border-radius: 20px; padding: 6px 16px; color: #0a0a0a; font-weight: bold; cursor: pointer; }
    </style>
</head>

        </div>
    </div>

                <button class="pin-btn empty"></button><button class="pin-btn" data-digit="0">0</button>
                <button class="pin-btn backspace" data-action="backspace">⌫</button>
            </div>
            <button class="forgot-pin" id="forgot-pin-btn">Забыли код-доступа?</button>
        </div>
    </div>

    <div id="main-screen" class="screen">
        <div class="main-container">
            <div class="header-info">

                <span id="zoom-indicator" class="zoom-indicator">Масштаб</span>
                <button id="zoom-in-btn" class="zoom-btn">🔍+</button>
            </div>
            <div class="search-section">
                <input type="text" id="search-input" class="search-input" placeholder="Напишите название: станции, документа или фамилию" autocomplete="off">
            </div>
            <div id="results-container" class="results-container hidden"></div>
        </div>
    </div>

    <div id="drawer-overlay" class="drawer-overlay"></div>
    <div id="drawer" class="drawer">

            <button id="drawer-logout" class="drawer-item"><span class="item-icon">🆔</span><span>Выход</span></button>
        </div>
        <div id="drawer-submenu-add" class="drawer-submenu">
            <button id="drawer-add-station" class="drawer-item" data-url="https://forms.gle/9mQKuBn1ggCTAnUeA"><span class="item-icon">🚇</span><span>О станции</span></button>
            <button id="drawer-add-parking" class="drawer-item" data-url="https://forms.gle/oG48epQE73tbvNAr9"><span class="item-icon">🅿️</span><span>О парковке</span></button>

            <button id="drawer-back-main" class="drawer-item drawer-back"><span class="item-icon">◀</span><span>Назад</span></button>
        </div>
    </div>

    <div id="notification" class="notification hidden"></div>

        const ENCRYPTED_CONTACTS_LEVEL1 = "";
        const ENCRYPTED_PARKING_LEVEL1 = "";
        
        let CONTACTS_DATA = [], STATIONS_DATA = [], DOCUMENTS_DATA = [], PARKING_DATA = [];

        function verifyAccessCode(inputCode) {
            if (!inputCode) return null;
            const hash = CryptoJS.SHA256(inputCode.trim()).toString();
            const userData = ACCESS_LEVELS[hash];
            return userData ? { ...userData, enteredCode: inputCode.trim() } : null;
        }
        
        function decryptData(encryptedBase64, password) {
            if (!encryptedBase64 || encryptedBase64.trim() === "") return [];
            try {
                const decrypted = CryptoJS.AES.decrypt(encryptedBase64, password);
                const decryptedStr = decrypted.toString(CryptoJS.enc.Utf8);
                return decryptedStr ? JSON.parse(decryptedStr) : [];
            } catch(e) { return []; }
        }

        function decryptAllDataWithCode(userData) {
            const accessCode = userData.enteredCode;
            if (userData.level === 3) {
                CONTACTS_DATA = decryptData(ENCRYPTED_CONTACTS_LEVEL3, accessCode);
                STATIONS_DATA = decryptData(ENCRYPTED_STATIONS_LEVEL3, accessCode);
                PARKING_DATA = decryptData(ENCRYPTED_PARKING_LEVEL3, accessCode);
                DOCUMENTS_DATA = decryptData(ENCRYPTED_DOCUMENTS_LEVEL3, accessCode);
            } else if (userData.level === 2) {
                CONTACTS_DATA = decryptData(ENCRYPTED_CONTACTS_LEVEL2, accessCode);
                STATIONS_DATA = decryptData(ENCRYPTED_STATIONS_LEVEL2, accessCode);
                PARKING_DATA = decryptData(ENCRYPTED_PARKING_LEVEL2, accessCode);
                DOCUMENTS_DATA = [];
            } else if (userData.level === 1) {
                CONTACTS_DATA = decryptData(ENCRYPTED_CONTACTS_LEVEL1, accessCode);
                PARKING_DATA = decryptData(ENCRYPTED_PARKING_LEVEL1, accessCode);
                STATIONS_DATA = []; DOCUMENTS_DATA = [];
            }
            return true;
        }
        
        function saveSession(userData) {
            const sessionData = {
                accessCodeHash: CryptoJS.SHA256(userData.enteredCode).toString(),
                level: userData.level, permissions: userData.permissions,
                contacts: CONTACTS_DATA, stations: STATIONS_DATA, parking: PARKING_DATA, documents: DOCUMENTS_DATA,
                timestamp: Date.now(), appVersion: APP_VERSION
            };
            localStorage.setItem('access_session_data', JSON.stringify(sessionData));
            localStorage.setItem('access_session_timestamp', sessionData.timestamp);
            sessionStorage.setItem('access_session_data', JSON.stringify(sessionData));
        }

        function isSessionValid() {
            const timestamp = localStorage.getItem('access_session_timestamp');
            if (!timestamp) return false;
            return (Date.now() - parseInt(timestamp)) < (30 * 24 * 60 * 60 * 1000);
        }

        function restoreSessionFromStorage() {
            if (!isSessionValid()) {
                localStorage.removeItem('access_session_data');
                localStorage.removeItem('access_session_timestamp');
                sessionStorage.removeItem('access_session_data');
                return null;
            }
            let sessionData = sessionStorage.getItem('access_session_data') || localStorage.getItem('access_session_data');
            if (!sessionData) return null;
            try {
                const data = JSON.parse(sessionData);
                CONTACTS_DATA = data.contacts || [];
                STATIONS_DATA = data.stations || [];
                PARKING_DATA = data.parking || [];
                DOCUMENTS_DATA = data.documents || [];
                const userData = ACCESS_LEVELS[data.accessCodeHash];
                return userData ? { ...userData, enteredCode: null } : null;
            } catch(e) { return null; }
        }
        
        const DATABASE = {
            contacts: [], stations: [], documents: [], parking: [], currentUser: null,
            init() { this.contacts = CONTACTS_DATA; this.stations = STATIONS_DATA; this.documents = DOCUMENTS_DATA; this.parking = PARKING_DATA; },
            hasPermission(perm) { return this.currentUser?.permissions?.includes(perm); },
            calculateMatchPercent(text, query) {
                if (!text || !query) return 0;
                const t = text.toLowerCase(), q = query.toLowerCase();
                if (t === q) return 100;
                if (t.includes(q)) return Math.min((q.length / t.length) * 100, 99);
                return 0;
            },
            searchAllRanked(q) {
                if (!q) return [];
                const lq = q.toLowerCase().trim();
                let results = [];
                if (this.hasPermission('stations')) {
                    this.stations.forEach(s => { let best = 0; if (s.searchName) best = Math.max(best, this.calculateMatchPercent(s.searchName, lq)); if (s.телефон) best = Math.max(best, this.calculateMatchPercent(s.телефон, lq)); if (best > 0) results.push({ ...s, type: 'station', matchPercent: best }); });
                }
                if (this.hasPermission('parking')) {
                    this.parking.forEach(p => { let best = 0; if (p.searchName) best = Math.max(best, this.calculateMatchPercent(p.searchName, lq)); if (best > 0) results.push({ ...p, type: 'parking', matchPercent: best }); });
                }
                if (this.hasPermission('contacts')) {
                    this.contacts.forEach(c => { let best = 0; if (c.searchName) best = Math.max(best, this.calculateMatchPercent(c.searchName, lq)); if (c.телефон) best = Math.max(best, this.calculateMatchPercent(c.телефон, lq)); if (best > 0) results.push({ ...c, type: 'contact', matchPercent: best }); });
                }
                if (this.hasPermission('documents')) {
                    this.documents.forEach(d => { let best = 0; if (d.searchName) best = Math.max(best, this.calculateMatchPercent(d.searchName, lq)); if (best > 0) results.push({ ...d, type: 'document', matchPercent: best }); });
                }
                return results.sort((a,b) => b.matchPercent - a.matchPercent);
            },
            setCurrentUser(u) { this.currentUser = u; }
        };

            showVersionInfo() {
                if (this.versionBadge) {
                    this.versionBadge.textContent = `v${APP_VERSION}`;
                    if ('serviceWorker' in navigator) {
                        navigator.serviceWorker.getRegistration().then(reg => {
                            if (reg?.active) this.versionBadge.style.background = 'rgba(0, 240, 255, 0.25)';
                        });
                    }
                }
            }

            async checkForUpdates() {
                this.showNotification('🔍 Проверка обновлений...', 'success');
                if ('serviceWorker' in navigator) {
                    try {
                        const registration = await navigator.serviceWorker.getRegistration();
                        if (registration) {
                            await registration.update();
                            const swUrl = registration.active?.scriptURL;
                            if (swUrl) {
                                const response = await fetch(swUrl + '?t=' + Date.now());
                                const swContent = await response.text();
                                let swVersion = swContent.match(/CACHE_VERSION\s*=\s*['"]([^'"]+)['"]/)?.[1];
                                if (swVersion) {
                                    const savedVersion = localStorage.getItem('sw_cache_version');
                                    if (savedVersion !== swVersion) {
                                        this.showNotification(`🆕 Доступна новая версия! Нажмите "Обновить БД"`, 'success');
                                        this.showUpdateBanner();
                                    } else {
                                        this.showNotification(`✅ Версия актуальна (${APP_VERSION})`, 'success');
                                    }
                                }
                            }
                        }
                    } catch(e) { console.error(e); }
                }
            }

            showUpdateBanner() {
                if (document.getElementById('force-update-banner')) return;
                const banner = document.createElement('div');
                banner.className = 'update-banner';
                banner.id = 'force-update-banner';
                banner.innerHTML = `<div class="update-banner-text">🔔 В базу данных добавлена новая информация!</div><button class="update-banner-btn" id="force-update-btn">🌐 Обновить БД</button>`;
                document.body.appendChild(banner);
                setTimeout(() => banner.classList.add('show'), 100);
                document.getElementById('force-update-btn')?.addEventListener('click', () => {
                    this.refreshData();
                    banner.classList.remove('show');
                    setTimeout(() => banner.remove(), 500);
                    sessionStorage.setItem('force_update_banner_shown', 'true');
                    localStorage.setItem('update_performed_since_last_sw', 'true');
                });
            }

            async refreshData() {
                if (!this.currentUser?.enteredCode) {
                    this.showNotification('❌ PIN не найден. Выполните повторный вход.', 'error');
                    this.handleLogout();
                    return;
                }
                const savedPin = this.currentUser.enteredCode;
                this.showLoadingMessage('Обновление данных...');
                CONTACTS_DATA = []; STATIONS_DATA = []; PARKING_DATA = []; DOCUMENTS_DATA = [];
                await new Promise(r => setTimeout(r, 100));
                decryptAllDataWithCode({ ...this.currentUser, enteredCode: savedPin });
                DATABASE.contacts = CONTACTS_DATA; DATABASE.stations = STATIONS_DATA;
                DATABASE.parking = PARKING_DATA; DATABASE.documents = DOCUMENTS_DATA;
                const sessionData = {
                    accessCodeHash: CryptoJS.SHA256(savedPin).toString(),
                    level: this.currentUser.level, permissions: this.currentUser.permissions,
                    contacts: CONTACTS_DATA, stations: STATIONS_DATA, parking: PARKING_DATA, documents: DOCUMENTS_DATA,
                    timestamp: Date.now(), appVersion: APP_VERSION
                };
                localStorage.setItem('access_session_data', JSON.stringify(sessionData));
                localStorage.setItem('access_session_timestamp', sessionData.timestamp);
                sessionStorage.setItem('access_session_data', JSON.stringify(sessionData));
                this.currentUser = { ...this.currentUser, enteredCode: savedPin };
                DATABASE.setCurrentUser(this.currentUser);
                if (this.searchInput?.value.trim()) {
                    const query = this.searchInput.value.trim();
                    this.displayResults(DATABASE.searchAllRanked(query.toLowerCase()), query);
                }
                this.showNotification('✅ Данные успешно обновлены!', 'success');
            }

            initPinPad() {
                const pad = document.getElementById('pin-pad');
                if (!pad) return;
                pad.addEventListener('click', (e) => {
                    const btn = e.target.closest('.pin-btn');
                    if (!btn) return;
                    const digit = btn.getAttribute('data-digit');
                    if (digit) this.addPinDigit(digit);
                    if (btn.getAttribute('data-action') === 'backspace') this.removePinDigit();
                });
                document.addEventListener('keydown', (e) => {
                    if (!this.loginScreen?.classList.contains('active')) return;
                    if (e.key >= '0' && e.key <= '9') { e.preventDefault(); this.addPinDigit(e.key); }
                    if (e.key === 'Backspace') { e.preventDefault(); this.removePinDigit(); }
                    if (e.key === 'Enter') this.submitPin();
                });
                this.forgotPinBtn?.addEventListener('click', () => window.location.href = 'tel:89169002420');
            }

            addPinDigit(d) { if (this.pinCode.length < this.maxPinLength) { this.pinCode += d; this.updatePinDots(); if (this.pinCode.length === this.maxPinLength) setTimeout(() => this.submitPin(), 200); } }
            removePinDigit() { this.pinCode = this.pinCode.slice(0, -1); this.updatePinDots(); }
            updatePinDots() { this.pinDots?.querySelectorAll('.pin-dot').forEach((dot, i) => dot.classList.toggle('filled', i < this.pinCode.length)); }

            async submitPin() {
                if (!this.pinCode) return;
                const userData = verifyAccessCode(this.pinCode);
                if (!userData) {
                    this.pinDots?.querySelectorAll('.pin-dot').forEach(d => d.classList.add('error'));
                    setTimeout(() => { this.pinCode = ""; this.updatePinDots(); }, 500);
                    this.showNotification('Неверный код доступа', 'error');
                    return;
                }
                this.showLoadingMessage('Расшифровка данных...');
                decryptAllDataWithCode(userData);
                this.currentUser = userData;
                DATABASE.setCurrentUser(userData);
                saveSession(userData);
                this.pinCode = "";
                this.updatePinDots();
                this.showMainScreen();
                this.showNotification(`Добро пожаловать, ${userData.greeting}!`, 'success');
            }

            applyZoom(percent) {
                percent = Math.max(this.minZoom, Math.min(this.maxZoom, percent));
                this.currentZoom = percent;
                const scale = percent / 100;
                if (this.searchInput) this.searchInput.style.fontSize = `${1.3 * scale}rem`;
                document.querySelectorAll('.result-title').forEach(el => el.style.fontSize = `${1 * scale}rem`);
                document.querySelectorAll('.result-detail, .result-contact').forEach(el => el.style.fontSize = `${0.8125 * scale}rem`);
                if (this.zoomIndicator) this.zoomIndicator.textContent = percent === 100 ? 'Масштаб' : `${percent}%`;
                localStorage.setItem('infa_zoom', this.currentZoom);
            }

            loadZoomSetting() { const saved = localStorage.getItem('infa_zoom'); if (saved) this.applyZoom(parseInt(saved)); else this.applyZoom(100); }

            showMainScreen() {
                this.loadingScreen?.classList.remove('active');
                this.loginScreen?.classList.remove('active');
                this.mainScreen?.classList.add('active');
                if (this.usernameSpan && this.currentUser) this.usernameSpan.textContent = this.currentUser.greeting;
                this.loadZoomSetting();
                this.showVersionInfo();
                if (this.searchInput) { this.searchInput.value = ''; setTimeout(() => this.searchInput.focus(), 100); }
                DATABASE.init();
            }

            showLoginScreen() {
                this.loadingScreen?.classList.remove('active');
                this.mainScreen?.classList.remove('active');
                this.loginScreen?.classList.add('active');
                this.pinCode = ""; this.updatePinDots();
            }

            handleLogout() {
                this.currentUser = null; DATABASE.setCurrentUser(null);
                localStorage.removeItem('access_session_data'); localStorage.removeItem('access_session_timestamp');
                sessionStorage.removeItem('access_session_data');
                this.showLoginScreen();
                this.showNotification('Вы вышли из аккаунта', 'success');
            }

            startLoading() {
                const restored = restoreSessionFromStorage();
                if (restored && isSessionValid()) {
                    this.currentUser = restored;
                    DATABASE.setCurrentUser(restored);
                    this.showMainScreen();
                } else { this.showLoginScreen(); }
            }

            liveSearch() {
                if (!this.searchInput) return;
                const q = this.searchInput.value.trim().toLowerCase();
                if (q.length < 2) { this.resultsContainer?.classList.add('hidden'); return; }
                const results = DATABASE.searchAllRanked(q);
                this.displayResults(results, q);
            }

            displayResults(results, q) {
                if (!this.resultsContainer) return;
                this.resultsContainer.classList.remove('hidden');
                if (!results.length) { this.resultsContainer.innerHTML = '<div class="no-results">Ничего не найдено</div>'; return; }
                this.resultsContainer.innerHTML = results.map(item => {
                    if (item.type === 'contact') {
                        return `<div class="result-card"><div class="result-icon">👤</div><div class="result-content"><div class="result-title">${this.escapeHtml(item.имя)}</div><div class="result-detail">💼 ${this.escapeHtml(item.должность)}</div>${item.телефон ? `<div class="result-contact"><a href="tel:${item.телефон.replace(/[^0-9+]/g,'')}">📞 ${this.escapeHtml(item.телефон)}</a></div>` : ''}</div></div>`;
                    } else if (item.type === 'parking') {
                        return `<div class="result-card"><div class="result-icon">🅿️</div><div class="result-content"><div class="result-title">${this.escapeHtml(item.название)}</div>${item.контекст ? `<div class="result-detail">${this.escapeHtml(item.контекст)}</div>` : ''}${item.ссылка ? `<div class="result-contact"><a href="${item.ссылка}" target="_blank">⭐️ ПОСТРОИТЬ МАРШРУТ</a></div>` : ''}</div></div>`;
                    } else if (item.type === 'station') {
                        return `<div class="result-card"><div class="result-icon">🚇</div><div class="result-content"><div class="result-title">${this.escapeHtml(item.станция || item.линия)}</div>${item.линия ? `<div class="result-detail">✳️ ${this.escapeHtml(item.линия)}</div>` : ''}${item.телефон ? `<div class="result-contact"><a href="tel:${item.телефон.replace(/[^0-9+]/g,'')}">📞 ${this.escapeHtml(item.телефон)}</a></div>` : ''}</div></div>`;
                    }
                    return '';
                }).join('');
                this.applyZoom(this.currentZoom);
            }

            showNotification(msg, type) {
                if (!this.notification) return;
                this.notification.textContent = msg;
                this.notification.className = `notification ${type}`;
                setTimeout(() => this.notification.classList.add('show'), 10);
                setTimeout(() => this.notification.classList.remove('show'), 3000);
            }

            showLoadingMessage(msg) { if (this.loadingText) this.loadingText.textContent = msg; }
            escapeHtml(t) { if (!t) return ''; const div = document.createElement('div'); div.textContent = t; return div.innerHTML; }

            openDrawer() { this.drawerOverlay?.classList.add('active'); this.drawer?.classList.add('active'); }
            closeDrawer() { this.drawerOverlay?.classList.remove('active'); this.drawer?.classList.remove('active'); }
            showAddSubmenu() { this.drawerMenuMain.style.display = 'none'; this.drawerSubmenuAdd.classList.add('active'); }
            hideAddSubmenu() { this.drawerMenuMain.style.display = 'flex'; this.drawerSubmenuAdd.classList.remove('active'); }

            bindEvents() {
                this.searchInput?.addEventListener('input', () => this.liveSearch());
                this.menuBtn?.addEventListener('click', () => this.openDrawer());
                this.drawerClose?.addEventListener('click', () => this.closeDrawer());
                this.drawerOverlay?.addEventListener('click', () => this.closeDrawer());
                this.zoomInBtn?.addEventListener('click', () => this.applyZoom(this.currentZoom + 10));
                this.zoomOutBtn?.addEventListener('click', () => this.applyZoom(this.currentZoom - 10));
                this.drawerRefresh?.addEventListener('click', () => { this.refreshData(); this.closeDrawer(); });
                this.drawerCheckUpdate?.addEventListener('click', () => { this.checkForUpdates(); this.closeDrawer(); });
                this.drawerError?.addEventListener('click', () => { window.open('https://forms.gle/ffQzDFhU2Lg9HncDA', '_blank'); this.closeDrawer(); });
                this.drawerAddData?.addEventListener('click', () => this.showAddSubmenu());
                this.drawerLogout?.addEventListener('click', () => { this.handleLogout(); this.closeDrawer(); });
                this.drawerBackMain?.addEventListener('click', () => this.hideAddSubmenu());
                this.drawerAddStation?.addEventListener('click', () => { window.open(this.drawerAddStation.getAttribute('data-url'), '_blank'); this.closeDrawer(); });
                this.drawerAddParking?.addEventListener('click', () => { window.open(this.drawerAddParking.getAttribute('data-url'), '_blank'); this.closeDrawer(); });
                this.drawerAddContact?.addEventListener('click', () => { window.open(this.drawerAddContact.getAttribute('data-url'), '_blank'); this.closeDrawer(); });
            }

            init() { this.cacheElements(); this.initPinPad(); this.bindEvents(); this.startLoading(); }
        }

        document.addEventListener('DOMContentLoaded', () => { window.app = new InfaApp(); });
        
        // Регистрация SW
        if ('serviceWorker' in navigator && location.protocol === 'https:') {
            window.addEventListener('load', () => {
                const path = window.location.pathname;
                const basePath = path.substring(0, path.lastIndexOf('/') + 1);
                navigator.serviceWorker.register(basePath + 'sw.js?v=' + Date.now())
                    .then(reg => {
                        reg.addEventListener('updatefound', () => {
                            reg.installing?.addEventListener('statechange', () => {
                                if (reg.installing?.state === 'installed' && navigator.serviceWorker.controller) {
                                    localStorage.removeItem('update_performed_since_last_sw');
                                    sessionStorage.removeItem('force_update_banner_shown');
                                    setTimeout(() => window.app?.showUpdateBanner(), 1000);
                                }
                            });
                        });
                    })
                    .catch(e => console.error('SW Error:', e));
            });
        }
    </script>
</body>
